# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name qhpanpan.top www.qhpanpan.top;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name qhpanpan.top www.qhpanpan.top;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/qhpanpan.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qhpanpan.top/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 所有响应统一声明 UTF-8 字符集，避免中文（如登录页错误提示）在中文 Windows
    # 客户端因响应缺少 charset 而被按 GBK 解码、出现乱码。若生产 curl 验证 /api
    # JSON 仍缺 charset，可在 /api/ location 内追加 override_charset on;（注意双编码风险）。
    charset utf-8;
    charset_types
        text/css
        text/xml
        text/plain
        text/vnd.wap.wml
        application/json
        application/javascript
        application/rss+xml
        text/javascript
        image/svg+xml;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # Client max upload size
    client_max_body_size 20M;

    # Frontend static files
    root /root/rock-slab/frontend/dist;
    index index.html;

    # API reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Media files (user uploads)
    location /media/ {
        alias /root/rock-slab/backend/media/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Backend static files (collectstatic)
    location /static/ {
        alias /root/rock-slab/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Frontend static assets (CSS/JS/images with hash)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # SPA fallback - serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

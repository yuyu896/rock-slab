services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rock-slab-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=rock_slab.settings.production
    volumes:
      - ./backend/media:/app/media
      - ./backend/staticfiles:/app/staticfiles
    network_mode: host
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
